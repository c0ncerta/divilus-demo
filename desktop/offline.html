<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DiavloCord | Offline</title>
    <style>
      :root {
        color-scheme: dark;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(1200px 600px at 20% -10%, rgba(255, 0, 106, 0.22), transparent 60%),
          radial-gradient(1000px 800px at 95% 110%, rgba(0, 140, 255, 0.18), transparent 55%),
          #07090f;
        color: #f4f5f6;
        font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
      }
      .card {
        width: min(92vw, 560px);
        border-radius: 22px;
        border: 1px solid rgba(255, 255, 255, 0.14);
        background: linear-gradient(180deg, rgba(24, 26, 33, 0.85), rgba(11, 12, 16, 0.88));
        backdrop-filter: blur(10px);
        box-shadow: 0 18px 60px rgba(0, 0, 0, 0.45);
        padding: 28px;
      }
      h1 {
        margin: 0 0 8px;
        font-size: 34px;
        line-height: 1;
        letter-spacing: -0.02em;
      }
      p {
        margin: 0;
        color: #afb5bf;
        line-height: 1.5;
      }
      .actions {
        margin-top: 22px;
        display: flex;
        gap: 10px;
      }
      button {
        appearance: none;
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 12px;
        padding: 10px 14px;
        color: white;
        background: rgba(255, 255, 255, 0.06);
        font-weight: 700;
        cursor: pointer;
      }
      button.primary {
        border-color: rgba(255, 0, 106, 0.45);
        background: rgba(255, 0, 106, 0.18);
      }
      button:hover {
        filter: brightness(1.08);
      }
      .hint {
        margin-top: 12px;
        font-size: 12px;
        color: #7f8794;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>DiavloCord</h1>
      <p>No se pudo cargar la web en este momento. Revisa conexion o backend y vuelve a intentar.</p>
      <div class="actions">
        <button class="primary" onclick="window.location.reload()">Reintentar</button>
        <button onclick="window.history.back()">Atras</button>
      </div>
      <p class="hint">Si persiste, cierra y vuelve a abrir la app.</p>
    </main>
  </body>
</html>
